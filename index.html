<!doctype html><html lang='pt-br'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Kart Firebase</title>
<script src='https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js'></script>
<link rel='stylesheet' href='css/styles.css'></head><body>
<div id='loading' class='section active'>Carregando...</div>
<section id='ranking' class='section active'><h2>🏆 Ranking</h2><div class='form-card'><select id='rankingCampeonato' onchange='RankingUI.render()'></select></div><div id='rankingTabela'></div></section>
<section id='campeonatos' class='section'><h2>Campeonatos</h2><div class='form-card'><input id='campId' placeholder='ID (opcional)'><input id='campNome' placeholder='Nome'><input id='campDesc' placeholder='Descrição'><div class='row'><input id='campAno' type='number' placeholder='Ano'><select id='campStatus'><option>ativo</option><option>encerrado</option><option>planejado</option></select></div><div class='row'><input id='campEtapas' value='7' type='number'><input id='campPole' value='1' type='number'></div><input id='campMv' value='1' type='number'><div class='row'><input id='campInicio' type='date'><input id='campFim' type='date'></div><button onclick='CampeonatosUI.salvar()'>Salvar</button></div><div id='listaCampeonatos'></div></section>
<section id='pilotos' class='section'><h2>Pilotos + Vínculos</h2><div class='form-card'><input id='pilotoDriverId' placeholder='driverId'><input id='pilotoNome' placeholder='Nome'><input id='pilotoApelido' placeholder='Apelido'><label><input id='pilotoAtivo' type='checkbox' checked> Ativo</label><button onclick='PilotosUI.salvar()'>Salvar piloto</button><button class='secondary' onclick='PilotosUI.seed()'>Seed pilotos iniciais</button></div><div id='listaPilotos'></div><div class='form-card'><select id='vincCampeonato' onchange='PilotosUI.carregarVinculos()'></select><div id='listaVinculos'></div><button onclick='PilotosUI.salvarVinculos()'>Salvar vínculos</button></div></section>
<section id='corridas' class='section'><h2>Corridas + Resultados</h2><div class='form-card'><input id='corridaId' placeholder='corridaId opcional'><select id='corridaCampeonato'></select><input id='corridaEtapa' type='number' placeholder='Etapa'><input id='corridaNome' placeholder='Nome'><input id='corridaData' type='date'><select id='corridaStatus'><option>planejada</option><option>realizada</option><option>cancelada</option></select><input id='corridaPole' placeholder='poleDriverId'><input id='corridaMv' placeholder='melhorVoltaDriverId'><button onclick='CorridasUI.salvarCorrida()'>Salvar corrida</button></div><div class='form-card'><select id='resCampeonato' onchange='CorridasUI.montarGridResultado()'></select><select id='resCorrida'></select><div id='gridResultado'></div><button onclick='CorridasUI.salvarResultados()'>Salvar resultados</button></div></section>
<section id='importar' class='section'><h2>Importar Arquivos</h2><div class='form-card'><select id='impCampeonato'></select><select id='impCorrida'></select><input id='impEtapa' type='number' placeholder='Etapa'><input id='impData' type='date'><label>Volta a volta</label><input id='fileVolta' type='file'><label>Classificação</label><input id='fileClass' type='file'><label>Resultado final</label><input id='fileFinal' type='file'><button onclick='ImportacaoUI.salvar()'>Salvar importação</button><div id='impFeedback'></div></div></section>
<section id='historico' class='section'><h2>Consultar Arquivos</h2><div id='diasImport'></div><div id='arquivosDia'></div></section>
<nav class='navbar'><div class='nav-item' onclick="showSection('ranking')">🏆<br>Ranking</div><div class='nav-item' onclick="showSection('campeonatos')">🏁<br>Camp.</div><div class='nav-item' onclick="showSection('pilotos')">👤<br>Pilotos</div><div class='nav-item' onclick="showSection('corridas')">⏱️<br>Corridas</div><div class='nav-item' onclick="showSection('importar')">📂<br>Importar</div><div class='nav-item' onclick="showSection('historico');HistoricoUI.carregarDias()">📜<br>Hist.</div></nav>
<script src='js/firebaseConfig.js'></script><script src='js/constants.js'></script><script src='js/utils.js'></script><script src='js/services/firestoreService.js'></script><script src='js/services/storageService.js'></script><script src='js/services/rankingService.js'></script><script src='js/services/importacaoService.js'></script><script src='js/ui/navigation.js'></script><script src='js/ui/rankingUI.js'></script><script src='js/ui/campeonatosUI.js'></script><script src='js/ui/pilotosUI.js'></script><script src='js/ui/corridasUI.js'></script><script src='js/ui/importacaoUI.js'></script><script src='js/ui/historicoUI.js'></script><script src='js/app.js'></script>
</body></html>
